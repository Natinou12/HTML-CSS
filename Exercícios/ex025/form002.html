<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulário</title>
  <style>
    body {
        font-family: Arial, Helvetica, sans-serif;
    }
    /* Não gosto de Times! */
  </style>
</head>
<body>
    <h1>Teste de Formulário</h1>

    <form action="cadastro.php" method="post" autocomplete="off">
        <p>
            <label for="isusu"> Usuário:</label>
            <input type="text" name="usu" id="iusu" required maxlength="20" placeholder="Seu nome">
        </p>
        <p>
            <label for="isen">Senha:</label>
            <input type="password" name="sen" id="isen" required minlength="8" placeholder="Sua senha">
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Apagar">
        </p>
    </form>

</body>
</html>
