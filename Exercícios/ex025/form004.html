<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulário</title>
  <style>
    body {
        font-family: Arial, Helvetica, sans-serif;
    }
  </style>
</head>
<body>
    <h1>Exemplo de Formulário</h1>
    <form action="cadastro.php" method="get" autocomplete="on">
        <fieldset>
            <legend>Dados Pessoais</legend>
            <p>
                <label for="inome">Nome:</label>
                <input type="text" name="nome" id="inome" required autocomplete="name">
            </p>
            <p>
                <label for="imail">E-mail:</label> <!-- Trocadilho insaaaano -->
                <input type="email" name="email" id="imail" required autocomplete="email">
            </p>
            <p>
                <label for="itel">Telefone:</label>
                <input type="tel" name="tel" id="itel" required pattern="^\(\d{2}\)[0-9]{4,5}-[0-9]{4,5}$">
            </p>
                <!-- Que diabo é isso tendi absolutamente NADA (Estudar RegEx algum ano) -->
            <p>
        </fieldset>
            <input type="submit" value="Enviar">
            <input type="reset" value="Apagar">
        </p>
    </form>

</body>
</html>
