<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flexible Box</title>
    <style>
      div.conteiner {
        background-color: lightsalmon;

        display: flex;
        flex-flow: row nowrap;
      }

      div.item {
        background-color: lightskyblue;

        border: 1px solid black;

        text-align: center;
      }

      div#A {
        /* flex-grow: 0;
        flex-shrink: 1; */

        flex: 0 1 200px;
      }

      div#B {
        /* flex-grow: 1;
        flex-shrink: 0; */

        flex: 1 0 200px;
      }

      div#C {
        /* flex-grow: 0;
        flex-shrink: 1 */

        flex: 0 1 200px;
      }
    </style>
  </head>
  <body>
    <div class="conteiner">
      <div class="item" id="A">A</div>
      <div class="item" id="B">B</div>
      <div class="item" id="C">C</div>
    </div>
  </body>
</html>
